name: DevSecOps CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  devsecops:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Create env files for Docker Compose
      run: |
        cp backend/users-service/.env.example backend/users-service/.env
        cp backend/academic-service/.env.example backend/academic-service/.env
        cp backend/api-gateway/.env.example backend/api-gateway/.env

        echo "DB_HOST=postgres" >> backend/users-service/.env
        echo "DB_USER=test" >> backend/users-service/.env
        echo "DB_PASSWORD=test" >> backend/users-service/.env
        echo "DB_HOST=postgres" >> backend/academic-service/.env
        echo "DB_USER=test" >> backend/academic-service/.env
        echo "DB_PASSWORD=test" >> backend/academic-service/.env
        echo "USERS_SERVICE_URL=http://users-service:3001" >> backend/api-gateway/.env
        echo "ACADEMIC_SERVICE_URL=http://academic-service:3002" >> backend/api-gateway/.env
        
        cp frontend/.env.example frontend/.env
        echo "VITE_API_URL=http://api-gateway:3000" >> frontend/.env

    - name: Install dependencies (backend)
      run: |
        npm ci --prefix backend/users-service
        npm ci --prefix backend/academic-service
        npm ci --prefix backend/api-gateway
    - name: Install dependencies (frontend)
      run: npm ci --prefix frontend

    - name: Lint users-service
      run: npm run lint --if-present --prefix backend/users-service
    - name: Lint academic-service
      run: npm run lint --if-present --prefix backend/academic-service
    - name: Lint api-gateway
      run: npm run lint --if-present --prefix backend/api-gateway
    - name: Lint frontend
      run: npm run lint --if-present --prefix frontend

    - name: Test users-service
      run: npm test --prefix backend/users-service
    - name: Test academic-service
      run: npm test --prefix backend/academic-service
    - name: Test api-gateway
      run: npm test --prefix backend/api-gateway
    - name: Test frontend
      run: npm test --prefix frontend
      
    - name: SCA Audit users-service
      run: npm audit --audit-level=critical --prefix backend/users-service
    - name: SCA Audit academic-service
      run: npm audit --audit-level=critical --prefix backend/academic-service
    - name: SCA Audit api-gateway
      run: npm audit --audit-level=critical --prefix backend/api-gateway
    - name: SCA Audit frontend
      run: npm audit --audit-level=critical --prefix frontend

    - name: Install Semgrep
      run: |
        python3 -m pip install --upgrade pip
        pip install semgrep
    - name: SAST Check
      run: |
        semgrep --config=auto --severity=ERROR backend/ frontend/

    - name: Build Docker images
      run: |
        docker compose -f backend/docker-compose.yml build
        docker tag users-service:latest users-service:${{ github.sha }}
        docker tag academic-service:latest academic-service:${{ github.sha }}
        docker tag api-gateway:latest api-gateway:${{ github.sha }}

    - name: Trivy scan users-service
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'users-service'
        severity: 'HIGH,CRITICAL'
        exit-code: 1

    - name: Trivy scan academic-service
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'academic-service'
        severity: 'HIGH,CRITICAL'
        exit-code: 1

    - name: Trivy scan api-gateway
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'api-gateway'
        severity: 'HIGH,CRITICAL'
        exit-code: 1

    - name: Run docker-compose
      run: |
        docker compose -f backend/docker-compose.yml up -d
        sleep 15

    - name: Smoke test API Gateway
      run: |
        curl -f http://localhost:3000/ || echo "No health endpoint, but gateway is up"

    - name: Shutdown services
      if: always()
      run: docker compose -f backend/docker-compose.yml down || true
